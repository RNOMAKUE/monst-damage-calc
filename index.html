<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ワンパンライン計算ツール [完全版]</title>
    <style>
        :root {
            --primary-color: #ff4b4b;
            --primary-hover: #e04343;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --border-color: #e0e0e0;
        }

        body { 
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; 
            padding: 20px; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            line-height: 1.6;
        }
        
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.08); 
        }

        h1 { 
            font-size: 24px; 
            text-align: center;
            border-bottom: 3px solid var(--primary-color); 
            padding-bottom: 15px; 
            margin-top: 0;
            margin-bottom: 30px; 
            color: #2c3e50;
        }

        .section {
            background: #fafbfc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .section h2 {
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 20px;
            color: var(--primary-color);
            border-left: 4px solid var(--primary-color);
            padding-left: 12px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }

        .form-group { 
            display: flex;
            flex-direction: column;
        }

        label { 
            font-weight: 600; 
            margin-bottom: 6px; 
            font-size: 13px; 
            color: var(--text-muted);
        }

        input { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 15px; 
            transition: border-color 0.3s;
            background-color: #fff;
        }

        input:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 75, 75, 0.1);
        }

        /* 数値入力のスピンボタンを少し隠す（見た目重視） */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            opacity: 0.5; 
        }

        button { 
            width: 100%; 
            background: var(--primary-color); 
            color: white; 
            border: none; 
            padding: 16px; 
            font-size: 18px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 10px; 
            transition: background 0.3s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(255, 75, 75, 0.2);
        }

        button:hover { 
            background: var(--primary-hover); 
        }
        
        button:active {
            transform: scale(0.98);
        }

        .result { 
            margin-top: 30px; 
            padding: 20px; 
            background: #f0f7ff; 
            border-radius: 8px; 
            border-left: 6px solid #2196F3; 
        }

        .result p { 
            margin: 12px 0; 
            font-size: 16px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed #c5d9ed;
            padding-bottom: 8px;
        }

        .result p:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .highlight { 
            font-size: 24px; 
            font-weight: bold; 
            color: #d32f2f; 
        }

        .helper-text {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        /* スマホ向けの微調整 */
        @media (max-width: 500px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ワンパンライン計算ツール</h1>
        
        <div class="section">
            <h2>基本ステータス</h2>
            <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                <div class="form-group">
                    <label>ボスのHP (※将命削り込みのHPを入力)</label>
                    <input type="number" id="hp" value="120000000">
                </div>
                <div class="form-group">
                    <label>友情火力 or 攻撃力</label>
                    <input type="number" id="power" value="401625">
                </div>
            </div>
        </div>

        <div class="section">
            <h2>共通倍率 <span class="helper-text">(該当しないものは 1 のままでOK)</span></h2>
            <div class="grid">
                <div class="form-group"><label>属性倍率</label><input type="number" step="0.01" id="attribute" value="1.33"></div>
                <div class="form-group"><label>直殴り</label><input type="number" step="0.01" id="direct" value="1"></div>
                <div class="form-group"><label>剣 / 剣パネル</label><input type="number" step="0.01" id="sword" value="1"></div>
                <div class="form-group"><label>キラー</label><input type="number" step="0.01" id="killer" value="1"></div>
                <div class="form-group"><label>超MS</label><input type="number" step="0.01" id="super_ms" value="1"></div>
                <div class="form-group"><label>その他倍率</label><input type="number" step="0.01" id="other" value="1"></div>
                <div class="form-group"><label>ゲージ</label><input type="number" step="0.01" id="gauge" value="1"></div>
                <div class="form-group"><label>SS倍率</label><input type="number" step="0.01" id="ss" value="1"></div>
                <div class="form-group"><label>アシスト</label><input type="number" step="0.01" id="assist" value="1"></div>
                <div class="form-group"><label>紋章 (対属)</label><input type="number" step="0.01" id="crest_attr" value="1"></div>
                <div class="form-group"><label>紋章 (対将)</label><input type="number" step="0.01" id="crest_boss" value="1"></div>
                <div class="form-group"><label>紋章 (守護)</label><input type="number" step="0.01" id="crest_guardian" value="1"></div>
            </div>
        </div>

        <div class="section">
            <h2>弱点・本体 専用項目</h2>
            <div class="grid">
                <div class="form-group"><label>弱点倍率</label><input type="number" step="0.1" id="weakness" value="3"></div>
                <div class="form-group"><label>弱点キラー</label><input type="number" step="0.01" id="weak_killer" value="1"></div>
                <div class="form-group"><label>紋章 (対弱)</label><input type="number" step="0.01" id="crest_weak" value="1"></div>
                <div class="form-group" style="border-left: 2px dashed #ddd; padding-left: 10px;">
                    <label style="color: #0066cc;">本体拾数 (ヒット判定数)</label>
                    <input type="number" id="hits" value="2">
                </div>
            </div>
        </div>

        <button onclick="calculate()">計算する</button>

        <div class="result" id="result-box" style="display: none;">
            <p>弱点ダメージ: <span id="weak-dmg">0</span></p>
            <p>本体ダメージ: <span id="body-dmg">0</span></p>
            <p>合計ダメージ: <span id="total-dmg" class="highlight">0</span></p>
            <p>判定: <span id="diff-dmg" style="font-weight:bold; font-size: 20px;">0</span></p>
        </div>
    </div>

    <script>
        // 入力値を取得する関数（空欄や不正な値の場合はデフォルト値を利用する）
        function getValue(id, defaultValue = 1) {
            const val = parseFloat(document.getElementById(id).value);
            return isNaN(val) ? defaultValue : val;
        }

        function calculate() {
            // 基本ステータス
            const hp = getValue('hp', 0);
            const power = getValue('power', 0);
            
            // 共通倍率
            const attr = getValue('attribute');
            const direct = getValue('direct');
            const sword = getValue('sword');
            const killer = getValue('killer');
            const superMs = getValue('super_ms');
            const other = getValue('other');
            const gauge = getValue('gauge');
            const ss = getValue('ss');
            const assist = getValue('assist');
            const crestAttr = getValue('crest_attr');
            const crestBoss = getValue('crest_boss');
            const crestGuardian = getValue('crest_guardian');

            // 個別倍率
            const weakness = getValue('weakness');
            const weakKiller = getValue('weak_killer');
            const crestWeak = getValue('crest_weak');
            const hits = getValue('hits', 0);

            // 共通の乗算部分を計算
            const commonMultiplier = attr * direct * sword * killer * superMs * other * gauge * ss * assist * crestAttr * crestBoss * crestGuardian;
            
            // 弱点用・本体用それぞれの最終倍率
            const weakMultiplier = commonMultiplier * weakness * weakKiller * crestWeak;
            const bodyMultiplier = commonMultiplier * hits;

            // Excelと同じように全乗算後に切り捨て（Math.floor）
            const weakDmg = Math.floor(power * weakMultiplier);
            const bodyDmg = Math.floor(power * bodyMultiplier);
            const total = weakDmg + bodyDmg;
            const diff = hp - total;

            // 画面に結果を反映
            document.getElementById('weak-dmg').innerText = weakDmg.toLocaleString();
            document.getElementById('body-dmg').innerText = bodyDmg.toLocaleString();
            document.getElementById('total-dmg').innerText = total.toLocaleString();
            
            const diffElem = document.getElementById('diff-dmg');
            if (diff > 0) {
                diffElem.innerText = diff.toLocaleString() + " ダメージ不足";
                diffElem.style.color = "#d32f2f"; // 赤色
            } else {
                diffElem.innerText = Math.abs(diff).toLocaleString() + " ダメージ余裕 (ワンパン可能！)";
                diffElem.style.color = "#1976d2"; // 青色
            }

            // 結果エリアを表示
            document.getElementById('result-box').style.display = "block";
            
            // 計算結果までスムーズにスクロール
            document.getElementById('result-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>
</body>
</html>
